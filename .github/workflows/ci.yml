name: Pipeline DevOps - Ciclo Automatico e Infraestructura AWS (IE3)

on:
  push:
    branches: [ "main" ]

jobs:
  devops-core-engine:
    runs-on: ubuntu-latest
    
    steps:
    - name: Descargar Codigo Fuente desde GitHub
      uses: actions/checkout@v4

    - name: Configurar Entorno Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Pre-compilar Artefactos Backend (Búsqueda Dinámica)
      run: |
        # 1. Buscar y compilar Ventas de forma dinámica
        POM_VENTAS=$(find . -name "pom.xml" | grep -i "ventas" | head -n 1)
        if [ ! -z "$POM_VENTAS" ]; then
          DIR_VENTAS=$(dirname "$POM_VENTAS")
          echo "Compilando Ventas detectado en: $DIR_VENTAS"
          cd "$DIR_VENTAS"
          mvn clean package -DskipTests
          mkdir -p target_meta && cp target/*.jar target_meta/app.jar || echo "Respaldo directo"
          cd -
          # Guardar la ruta real para el paso de Docker
          echo "R_VENTAS=$DIR_VENTAS" >> $GITHUB_ENV
        else
          echo "R_VENTAS=./back-Ventas_SpringBoot" >> $GITHUB_ENV
        fi

        # 2. Buscar y compilar Despachos de forma dinámica
        POM_DESPACHOS=$(find . -name "pom.xml" | grep -i "despachos" | head -n 1)
        if [ ! -z "$POM_DESPACHOS" ]; then
          DIR_DESPACHOS=$(dirname "$POM_DESPACHOS")
          echo "Compilando Despachos detectado en: $DIR_DESPACHOS"
          cd "$DIR_DESPACHOS"
          mvn clean package -DskipTests
          mkdir -p target_meta && cp target/*.jar target_meta/app.jar || echo "Respaldo directo"
          cd -
          # Guardar la ruta real para el paso de Docker
          echo "R_DESPACHOS=$DIR_DESPACHOS" >> $GITHUB_ENV
        else
          echo "R_DESPACHOS=./back-Despachos_SpringBoot" >> $GITHUB_ENV
        fi

    - name: Autenticacion Cifrada en AWS Academy (Minimo Privilegio)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login de Seguridad en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Fabricar Repositorios y Publicar Imagenes con Git Tags
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Validar o crear repositorios en AWS ECR
        aws ecr describe-repositories --repository-names back-ventas || aws ecr create-repository --repository-name back-ventas
        aws ecr describe-repositories --repository-names back-despachos || aws ecr create-repository --repository-name back-despachos
        aws ecr describe-repositories --repository-names front-despacho || aws ecr create-repository --repository-name front-despacho
        
        # Generar Dockerfiles limpios directamente en los directorios donde están los archivos compilados
        cat <<EOF > ${{ env.R_VENTAS }}/Dockerfile.clean
        FROM openjdk:17-jdk-slim
        WORKDIR /app
        COPY target_meta/app.jar app.jar
        EXPOSE 8080
        ENTRYPOINT ["java", "-jar", "app.jar"]
        EOF

        cat <<EOF > ${{ env.R_DESPACHOS }}/Dockerfile.clean
        FROM openjdk:17-jdk-slim
        WORKDIR /app
        COPY target_meta/app.jar app.jar
        EXPOSE 8081
        ENTRYPOINT ["java", "-jar", "app.jar"]
        EOF

        # Construcción y subida con contextos dinámicos exactos
        docker build -t $ECR_REGISTRY/back-ventas:latest -t $ECR_REGISTRY/back-ventas:$IMAGE_TAG -f ${{ env.R_VENTAS }}/Dockerfile.clean ${{ env.R_VENTAS }}
        docker push $ECR_REGISTRY/back-ventas --all-tags
        
        docker build -t $ECR_REGISTRY/back-despachos:latest -t $ECR_REGISTRY/back-despachos:$IMAGE_TAG -f ${{ env.R_DESPACHOS }}/Dockerfile.clean ${{ env.R_DESPACHOS }}
        docker push $ECR_REGISTRY/back-despachos --all-tags
        
        docker build -t $ECR_REGISTRY/front-despacho:latest -t $ECR_REGISTRY/front-despacho:$IMAGE_TAG ./front_despacho
        docker push $ECR_REGISTRY/front-despacho --all-tags

    - name: Configurar Binarios de Terraform en el Agente CI/CD
      uses: hashicorp/setup-terraform@v3

    - name: Orquestar Infraestructura Real en AWS Cloud
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve
