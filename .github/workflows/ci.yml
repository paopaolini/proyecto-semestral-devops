name: Pipeline DevOps - Ciclo Automatico e Infraestructura AWS (IE3)

on:
  push:
    branches: [ "main" ]

jobs:
  devops-core-engine:
    runs-on: ubuntu-latest
    
    steps:
    - name: Descargar Codigo Fuente desde GitHub
      uses: actions/checkout@v4

    - name: Configurar Entorno Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Compilar Componentes Backend (Busqueda Dinamica)
      run: |
        # Buscar el directorio real donde está el pom.xml de Ventas y compilar
        POM_VENTAS=$(find . -name "pom.xml" | grep -i "ventas" | head -n 1)
        if [ ! -z "$POM_VENTAS" ]; then
          DIR_VENTAS=$(dirname "$POM_VENTAS")
          echo "Compilando Ventas en: $DIR_VENTAS"
          cd "$DIR_VENTAS" && mvn clean package -DskipTests && cd -
        else
          echo "No se encontro pom.xml para Ventas"
        fi

        # Buscar el directorio real donde está el pom.xml de Despachos y compilar
        POM_DESPACHOS=$(find . -name "pom.xml" | grep -i "despachos" | head -n 1)
        if [ ! -z "$POM_DESPACHOS" ]; then
          DIR_DESPACHOS=$(dirname "$POM_DESPACHOS")
          echo "Compilando Despachos en: $DIR_DESPACHOS"
          cd "$DIR_DESPACHOS" && mvn clean package -DskipTests && cd -
        else
          echo "No se encontro pom.xml para Despachos"
        fi

    - name: Autenticacion Cifrada en AWS Academy (Minimo Privilegio)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1

    - name: Login de Seguridad en Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Fabricar Repositorios y Publicar Imagenes con Git Tags
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Validar o crear repositorios en AWS ECR
        aws ecr describe-repositories --repository-names back-ventas || aws ecr create-repository --repository-name back-ventas
        aws ecr describe-repositories --repository-names back-despachos || aws ecr create-repository --repository-name back-despachos
        aws ecr describe-repositories --repository-names front-despacho || aws ecr create-repository --repository-name front-despacho
        
        # Construcción usando las rutas raíz del monorrepo
        docker build -t $ECR_REGISTRY/back-ventas:latest -t $ECR_REGISTRY/back-ventas:$IMAGE_TAG ./back-Ventas_SpringBoot
        docker push $ECR_REGISTRY/back-ventas --all-tags
        
        docker build -t $ECR_REGISTRY/back-despachos:latest -t $ECR_REGISTRY/back-despachos:$IMAGE_TAG ./back-Despachos_SpringBoot
        docker push $ECR_REGISTRY/back-despachos --all-tags
        
        docker build -t $ECR_REGISTRY/front-despacho:latest -t $ECR_REGISTRY/front-despacho:$IMAGE_TAG ./front_despacho
        docker push $ECR_REGISTRY/front-despacho --all-tags

    - name: Configurar Binarios de Terraform en el Agente CI/CD
      uses: hashicorp/setup-terraform@v3

    - name: Orquestar Infraestructura Real en AWS Cloud
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve
